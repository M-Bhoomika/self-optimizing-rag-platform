apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: api
          image: rag-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: rag-platform-env
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: rag-platform
spec:
  selector:
    app: rag-api
  ports:
    - port: 8000
      targetPort: 8000
